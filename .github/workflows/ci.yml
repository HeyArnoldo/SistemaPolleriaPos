name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      HUSKY: '0'
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Habilitar corepack (pnpm pineado en packageManager)
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

      # Los tipos de @app/contracts viven en su dist/: hay que compilarlo
      # antes de lint/typecheck o la api/web no resuelven el módulo.
      - name: Build contracts
        run: pnpm --filter @app/contracts build

      - name: Build carbopuntos-contracts
        run: pnpm --filter @app/carbopuntos-contracts build

      - name: Build carbopuntos-client
        run: pnpm --filter @app/carbopuntos-client build

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Tests
        run: pnpm test
