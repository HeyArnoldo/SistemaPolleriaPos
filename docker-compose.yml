# Desarrollo local: solo la base de datos.
# Adminer (UI web para la DB) es opcional: docker compose --profile tools up -d
services:
  db:
    image: postgres:16-alpine
    container_name: sistema-polleria-pos-db
    environment:
      POSTGRES_USER: ${DB_USER:-app}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-app}
      POSTGRES_DB: ${DB_NAME:-sistema_polleria_pos}
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-app} -d ${DB_NAME:-sistema_polleria_pos}']
      interval: 5s
      timeout: 5s
      retries: 10

  # Base de datos PROPIA del hub CARBOPUNTOS (separada de la del POS).
  # Opt-in: docker compose --profile carbopuntos up -d carbopuntos-db
  # Puerto 5433 por defecto para no chocar con la db del POS (5432).
  carbopuntos-db:
    image: postgres:16-alpine
    container_name: carbopuntos-hub-db
    profiles: ['carbopuntos']
    environment:
      POSTGRES_USER: ${CARBOPUNTOS_DB_USER:-app}
      POSTGRES_PASSWORD: ${CARBOPUNTOS_DB_PASSWORD:-app}
      POSTGRES_DB: ${CARBOPUNTOS_DB_NAME:-carbopuntos}
    ports:
      - '${CARBOPUNTOS_DB_PORT:-5433}:5432'
    volumes:
      - carbopuntos_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${CARBOPUNTOS_DB_USER:-app} -d ${CARBOPUNTOS_DB_NAME:-carbopuntos}']
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:4
    profiles: ['tools']
    ports:
      - '${ADMINER_PORT:-8081}:8080'
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  carbopuntos_pgdata:
