# Stack completo para VERIFICAR los Dockerfiles localmente (no es el deploy real;
# en Coolify cada app se despliega con su propio Dockerfile).
#   docker compose -f docker-compose.prod.yml up -d --build
#   → web en http://localhost:8090, api en http://localhost:3000
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-app}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-app}
      POSTGRES_DB: ${DB_NAME:-sistema_polleria_pos}
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-app} -d ${DB_NAME:-sistema_polleria_pos}']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      NODE_ENV: production
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-app}
      DB_PASSWORD: ${DB_PASSWORD:-app}
      DB_NAME: ${DB_NAME:-sistema_polleria_pos}
      API_PORT: 3000
      CORS_ORIGIN: http://localhost:8090
      FRONTEND_URL: http://localhost:8090
      AUTH_LOCAL_ENABLED: ${AUTH_LOCAL_ENABLED:-true}
      JWT_SECRET: ${JWT_SECRET:-cambiame_por_un_secreto_largo}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      COOKIE_SAMESITE: ${COOKIE_SAMESITE:-lax}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin1234!}
    ports:
      - '3000:3000'
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # En esta verificación local el navegador pega directo a la API expuesta.
        VITE_API_URL: http://localhost:3000
    ports:
      - '8090:80'
    depends_on:
      - api

volumes:
  pgdata_prod:
